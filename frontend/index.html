<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>Myntra Product Scraper</title>
    <link rel="stylesheet" href="/static/styles.css?v=2" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div>
          <h1>Myntra Product Scraper</h1>
          <p>Upload a CSV with a <code>product_id</code> column and download structured JSON results.</p>
        </div>
        <form id="upload-form">
          <label class="field file-field">
            <span>CSV file</span>
            <input id="file" name="file" type="file" accept=".csv" required />
          </label>
          <label class="field limit-field">
            <span>Limit</span>
            <input id="limit" name="limit" type="number" min="1" placeholder="Optional" />
          </label>
          <label class="checkbox-label">
            <input id="include-delivery" name="include-delivery" type="checkbox" />
            Include delivery estimates
          </label>
          <button type="submit">Run</button>
        </form>
      </section>

      <section id="state" class="state">Ready.</section>
      <section id="summary" class="summary"></section>
      <section class="table-wrap">
        <table id="results">
          <thead>
            <tr>
              <th>Row</th>
              <th>Product ID</th>
              <th>Status</th>
              <th>Image</th>
              <th>Title</th>
              <th>Rating</th>
              <th>Category</th>
              <th>Sponsored Results</th>
              <th>Delivery</th>
              <th>Errors</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
      <a id="download" class="download" hidden>Download JSON</a>
    </main>
    <script src="/static/app.js?v=2"></script>
  </body>
</html>
