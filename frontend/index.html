<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>Myntra Product Scraper</title>
    <link rel="stylesheet" href="/static/styles.css?v=3" />
  </head>
  <body>
    <main class="shell">
      <header class="page-header">
        <h1>Myntra Product Scraper</h1>
        <p>Upload a CSV with a <code>product_id</code> column to extract product details, images, ratings, and sponsored results.</p>
      </header>

      <form id="upload-form" class="controls">
        <label class="field file-field" for="file">
          <span class="field-label">CSV file</span>
          <input id="file" name="file" type="file" accept=".csv" required />
        </label>
        <label class="field limit-field" for="limit">
          <span class="field-label">Limit</span>
          <input id="limit" name="limit" type="number" min="1" placeholder="All" />
        </label>
        <label class="checkbox-label" for="include-delivery">
          <input id="include-delivery" name="include-delivery" type="checkbox" />
          Include delivery estimates
        </label>
        <button type="submit">Run</button>
      </form>

      <section id="state" class="state" aria-live="polite">Ready.</section>
      <section id="summary" class="summary" aria-label="Summary"></section>

      <section id="empty-state" class="empty-state">
        <p>No results yet. Upload a CSV and click <strong>Run</strong> to begin.</p>
      </section>

      <section class="table-wrap">
        <table id="results">
          <thead>
            <tr>
              <th>Row</th>
              <th>Product ID</th>
              <th>Status</th>
              <th>Image</th>
              <th>Title</th>
              <th>Rating</th>
              <th>Category</th>
              <th>Sponsored Results</th>
              <th>Delivery</th>
              <th>Errors</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
      <a id="download" class="download" hidden>Download JSON</a>
    </main>
    <script src="/static/app.js?v=3"></script>
  </body>
</html>
